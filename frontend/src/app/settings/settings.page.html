<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Settings</ion-title>
        <ion-buttons slot="start">
          <ion-back-button></ion-back-button>
        </ion-buttons>
    <ion-buttons slot="end">
      <ion-button (click)="resetSettings()" fill="clear">Reset</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Settings</ion-title>
    </ion-toolbar>
  </ion-header>
  <div class="settings-wrapper">
    <ion-list inset="true" class="settings-list">
      <ion-item (click)="presentLanguageActionSheet()" button="true">
        <ion-label>Language</ion-label>
        <ion-label slot="end" class="language-value">
          @if (getCurrentLanguageOption()) {
            <span [ngClass]="['fi', getCurrentLanguageOption()!.flagClass]"></span>
            {{ getCurrentLanguageOption()!.label }}
          }
        </ion-label>
      </ion-item>

      <ion-item>
        <ion-label>Theme</ion-label>
        <div class="theme-toggle" slot="end">
          <ion-icon [icon]="sunIcon" [class.active]="theme === 'light'"></ion-icon>
          <ion-toggle
            [checked]="theme === 'dark'"
            (ionChange)="onThemeToggle($event.detail.checked)"
            aria-label="Toggle dark mode"
          ></ion-toggle>
          <ion-icon [icon]="moonIcon" [class.active]="theme === 'dark'"></ion-icon>
        </div>
      </ion-item>

      <ion-item>
        <ion-label>Currency</ion-label>
        <ion-select [(ngModel)]="currency" interface="popover" placeholder="Select currency">
          @for (option of currencyOptions; track option.value) {
            <ion-select-option [value]="option.value">
              {{ getCurrencySymbolFor(option.value) }} {{ option.label }}
            </ion-select-option>
          }
        </ion-select>
      </ion-item>
    </ion-list>

    <ion-button expand="block" class="save-btn" (click)="saveSettings()">
      Save settings
    </ion-button>
  </div>
</ion-content>
